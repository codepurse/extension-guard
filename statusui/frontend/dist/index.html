<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Extension Guard</title>
<style>
  :root {
    --bg: #0e0e11; --surface: #17171c; --surface2: #1f1f26; --border: #2a2a33;
    --text: #e8e8ec; --muted: #9a9aa6; --faint: #6e6e78;
    --accent: #6366f1; --accent-dim: #534ab7;
    --ok: #34d399; --ok-bg: rgba(52,211,153,0.12);
    --warn: #f59e0b; --warn-bg: rgba(245,158,11,0.12);
    --danger: #b91c1c; --danger-hi: #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-user-select: none; user-select: none;
  }
  .wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .topbar { display: flex; align-items: center; gap: 10px; }
  .topbar .name { font-weight: 600; font-size: 14px; }
  .pill { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .pill.active { color: var(--ok); background: var(--ok-bg); }
  .pill.inactive { color: var(--faint); background: var(--surface2); }
  .pill.paused { color: var(--warn); background: var(--warn-bg); }
  .hero { display: flex; align-items: center; gap: 14px; }
  .hero .ring {
    width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: var(--ok-bg); color: var(--ok); flex-shrink: 0;
  }
  .hero.off .ring { background: var(--surface2); color: var(--faint); }
  .hero.paused .ring { background: var(--warn-bg); color: var(--warn); }
  .hero h1 { font-size: 17px; font-weight: 600; margin: 0; }
  .hero p { margin: 0; color: var(--muted); font-size: 13px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .card .lbl { font-size: 12px; color: var(--muted); }
  .card .val { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .section-title { font-size: 12px; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; }
  .rows { display: flex; flex-direction: column; gap: 6px; }
  .row {
    display: flex; align-items: center; gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px;
  }
  .row .bname { font-size: 13px; text-transform: capitalize; }
  .row .badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; }
  .badge.locked { color: var(--ok); background: var(--ok-bg); }
  .badge.unlocked { color: var(--faint); background: var(--surface2); }
  .row.absent { opacity: .45; }
  .row .toggle { margin-left: auto; padding: 3px 12px; font-size: 11px; font-weight: 600; border-radius: 999px; }
  .row .toggle.on, .row .toggle.on:hover { background: var(--ok-bg); color: var(--ok); }
  .row .toggle.off, .row .toggle.off:hover { background: var(--surface2); color: var(--muted); }
  .row .toggle:hover { filter: brightness(1.2); }
  .exthint { font-size: 12px; color: var(--muted); margin: -6px 0 0; }
  .row .extname { text-transform: none; }
  input[type=password] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 10px; font-size: 13px; outline: none;
  }
  input[type=password]:focus { border-color: var(--accent); }
  button {
    background: var(--accent-dim); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent); }
  button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  button.ghost:hover { background: var(--surface2); color: var(--text); }
  button.danger { background: var(--danger); }
  button.danger:hover { background: var(--danger-hi); }
  button:disabled { opacity: .55; cursor: default; }
  /* Prominent single control for overall protection. */
  .bigbtn { width: 100%; padding: 12px; font-size: 14px; border-radius: 10px; }
  .msg { font-size: 12px; min-height: 16px; }
  .msg.ok { color: var(--ok); } .msg.err { color: #f87171; }
  .foot { display: flex; align-items: center; gap: 10px; color: var(--faint); font-size: 11px; }
  .foot button { margin-left: auto; }
  .foot button + button { margin-left: 0; }
  /* Password prompt modal - shown only for actions that weaken protection. */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; width: 340px; max-width: 90%; }
  .modal .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .modal input[type=password] { width: 100%; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <img src="logo.png" width="20" height="20" alt="" />
    <span class="name">Extension Guard</span>
    <span id="pill" class="pill inactive">…</span>
  </div>

  <div id="hero" class="hero off">
    <div class="ring">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    </div>
    <div>
      <h1 id="hero-title">Checking…</h1>
      <p id="hero-sub">Reading protection status</p>
    </div>
  </div>

  <button id="protection-btn" class="bigbtn">…</button>
  <div id="msg" class="msg"></div>

  <div class="cards">
    <div class="card"><div class="lbl">Service</div><div class="val" id="svc-val">—</div></div>
    <div class="card"><div class="lbl">Browsers locked</div><div class="val" id="locked-val">—</div></div>
  </div>

  <div id="update-banner" class="card" style="display:none; border-color: var(--accent-dim);">
    <div class="lbl" id="update-text" style="color: var(--text);">An update is available.</div>
    <div style="display:flex; gap:8px; align-items:center; margin-top:10px;">
      <button id="update-btn">Update now</button>
      <span id="update-msg" class="msg"></span>
    </div>
  </div>

  <div class="section-title">Browsers</div>
  <div class="rows" id="rows"></div>

  <div class="section-title">Protected extensions</div>
  <p class="exthint" id="exthint">Turning one on adds protection (free). Turning one off needs the password.</p>
  <div class="rows" id="ext-rows"></div>

  <div class="foot">
    <span id="ver">Extension Guard</span>
    <button class="ghost" id="check-updates">Check for updates</button>
    <button class="ghost" id="refresh">Refresh</button>
  </div>

</div>

<!-- Password prompt, shown only when an action weakens protection. -->
<div id="pw-modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="pw-modal-title">Enter password</div>
    <input id="pw-modal-input" type="password" placeholder="Password" autocomplete="off" />
    <div id="pw-modal-msg" class="msg"></div>
    <div class="modal-actions">
      <button class="ghost" id="pw-modal-cancel">Cancel</button>
      <button id="pw-modal-ok">Confirm</button>
    </div>
  </div>
</div>

<script>
  function bound() { return window.go && window.go.main && window.go.main.App; }

  let current = { serviceRunning: false, disabled: false };

  function setMsg(text, kind) {
    const m = document.getElementById('msg');
    m.className = 'msg' + (kind ? ' ' + kind : '');
    m.textContent = text || '';
  }

  // askPassword shows the modal and resolves with the typed password, or null if
  // the user cancels. Used only for actions that weaken protection.
  function askPassword(title) {
    return new Promise(function (resolve) {
      const modal = document.getElementById('pw-modal');
      const input = document.getElementById('pw-modal-input');
      const pmsg = document.getElementById('pw-modal-msg');
      const okBtn = document.getElementById('pw-modal-ok');
      const cancelBtn = document.getElementById('pw-modal-cancel');
      document.getElementById('pw-modal-title').textContent = title;
      input.value = ''; pmsg.textContent = ''; pmsg.className = 'msg';
      modal.style.display = 'flex';
      setTimeout(function () { input.focus(); }, 0);

      function cleanup() {
        modal.style.display = 'none';
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        input.removeEventListener('keydown', onKey);
      }
      function onOk() {
        if (!input.value) { pmsg.className = 'msg err'; pmsg.textContent = 'Enter the password.'; return; }
        const v = input.value; cleanup(); resolve(v);
      }
      function onCancel() { cleanup(); resolve(null); }
      function onKey(e) {
        if (e.key === 'Enter') { e.preventDefault(); onOk(); }
        else if (e.key === 'Escape') { onCancel(); }
      }
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      input.addEventListener('keydown', onKey);
    });
  }

  function render(s) {
    current = s;
    const active = !!s.serviceRunning && !s.disabled;
    const paused = !!s.disabled;

    const pill = document.getElementById('pill');
    pill.textContent = paused ? 'Paused' : (s.serviceRunning ? 'Active' : 'Inactive');
    pill.className = 'pill ' + (paused ? 'paused' : (s.serviceRunning ? 'active' : 'inactive'));

    const hero = document.getElementById('hero');
    hero.className = 'hero' + (paused ? ' paused' : (s.serviceRunning ? '' : ' off'));
    document.getElementById('hero-title').textContent =
      paused ? 'Protection paused' : (s.serviceRunning ? 'Protection active' : 'Protection inactive');
    document.getElementById('hero-sub').textContent =
      paused ? 'You turned protection off. Turn it back on to resume filtering.'
             : (s.serviceRunning ? 'The guard service is running and watching your browsers.'
                                 : 'The guard service is not running.');

    document.getElementById('svc-val').textContent = paused ? 'Paused' : (s.serviceRunning ? 'Running' : 'Stopped');
    document.getElementById('locked-val').textContent = s.lockedCount;

    // One prominent control: disable when active (weakens -> password), else enable
    // (strengthens -> free).
    const btn = document.getElementById('protection-btn');
    btn.textContent = active ? 'Disable protection' : 'Enable protection';
    btn.className = 'bigbtn' + (active ? ' danger' : '');

    document.getElementById('exthint').textContent = paused
      ? 'Protection is paused — turning an extension off is free while paused. Turning one on adds protection.'
      : 'Turning one on adds protection (free). Turning one off needs the password.';

    const rows = document.getElementById('rows');
    rows.innerHTML = '';
    (s.browsers || []).forEach(function (b) {
      const row = document.createElement('div');
      row.className = 'row' + (b.installed ? '' : ' absent');
      const name = document.createElement('span');
      name.className = 'bname';
      name.textContent = b.kind;
      const badge = document.createElement('span');
      if (b.locked) { badge.className = 'badge locked'; badge.textContent = 'Locked'; }
      else { badge.className = 'badge unlocked'; badge.textContent = b.detail; }
      row.appendChild(name);
      row.appendChild(badge);
      rows.appendChild(row);
    });

    const extRows = document.getElementById('ext-rows');
    extRows.innerHTML = '';
    (s.extensions || []).forEach(function (e) {
      const row = document.createElement('div');
      row.className = 'row';
      const name = document.createElement('span');
      name.className = 'bname extname';
      name.textContent = e.label || e.name;
      const tog = document.createElement('button');
      tog.className = 'toggle ' + (e.enabled ? 'on' : 'off');
      tog.textContent = e.enabled ? 'On' : 'Off';
      tog.addEventListener('click', function () { toggleExt(e.name, e.label || e.name, e.enabled); });
      row.appendChild(name);
      row.appendChild(tog);
      extRows.appendChild(row);
    });
  }

  // toggleProtection flips overall protection. Disabling weakens it -> ask the
  // password. Enabling strengthens it -> free (UAC only).
  async function toggleProtection() {
    if (!bound()) { return; }
    const disabling = current.serviceRunning && !current.disabled;
    let res;
    if (disabling) {
      const pw = await askPassword('Enter the password to turn protection off');
      if (pw === null) { return; }
      setMsg('Approve the Windows permission prompt…');
      try { res = await window.go.main.App.Disable(pw); } catch (e) { res = { ok: false, message: String(e) }; }
    } else {
      setMsg('Approve the Windows permission prompt…');
      try { res = await window.go.main.App.Enable(); } catch (e) { res = { ok: false, message: String(e) }; }
    }
    setMsg(res.message, res.ok ? 'ok' : 'err');
    await refresh();
  }

  // toggleExt flips one extension. Turning off weakens protection -> ask the
  // password, UNLESS protection is paused (nothing to bypass). Turning on is free.
  async function toggleExt(name, label, enabled) {
    if (!bound()) { return; }
    let res;
    if (enabled) {
      // currently on -> turning it off
      if (!current.disabled) {
        const pw = await askPassword('Enter the password to turn ' + label + ' off');
        if (pw === null) { return; }
        setMsg('Approve the Windows permission prompt…');
        try { res = await window.go.main.App.DisableExtension(name, pw); } catch (e) { res = { ok: false, message: String(e) }; }
      } else {
        setMsg('Approve the Windows permission prompt…');
        try { res = await window.go.main.App.DisableExtension(name, ''); } catch (e) { res = { ok: false, message: String(e) }; }
      }
    } else {
      // currently off -> turning it on (free)
      setMsg('Approve the Windows permission prompt…');
      try { res = await window.go.main.App.EnableExtension(name); } catch (e) { res = { ok: false, message: String(e) }; }
    }
    setMsg(res.message, res.ok ? 'ok' : 'err');
    await refresh();
  }

  async function refresh() {
    if (!bound()) {
      document.getElementById('hero-title').textContent = 'Run inside the app';
      document.getElementById('hero-sub').textContent = 'This window must be launched by Extension Guard.';
      return;
    }
    render(await window.go.main.App.GetStatus());
  }

  // loadVersion shows the running build in the footer, e.g. "Extension Guard v1.2.0".
  async function loadVersion() {
    if (!bound() || !window.go.main.App.GetVersion) { return; }
    try {
      const v = await window.go.main.App.GetVersion();
      document.getElementById('ver').textContent = 'Extension Guard v' + v;
    } catch (e) { /* leave the default label */ }
  }

  // checkUpdates asks the backend whether a newer release exists and shows the
  // banner when one does. A manual check also reports "up to date" and failures;
  // the automatic on-open check stays silent unless there's an update to offer.
  async function checkUpdates(manual) {
    if (!bound() || !window.go.main.App.CheckForUpdate) { return; }
    const banner = document.getElementById('update-banner');
    const text = document.getElementById('update-text');
    const umsg = document.getElementById('update-msg');
    const btn = document.getElementById('update-btn');
    const checkBtn = document.getElementById('check-updates');
    if (manual) { checkBtn.disabled = true; checkBtn.textContent = 'Checking…'; }
    let res;
    try { res = await window.go.main.App.CheckForUpdate(); }
    catch (e) { res = { error: String(e) }; }
    if (manual) { checkBtn.disabled = false; checkBtn.textContent = 'Check for updates'; }

    if (res.error) {
      if (manual) { banner.style.display = ''; btn.style.display = 'none'; text.textContent = res.error; umsg.textContent = ''; }
      return;
    }
    if (res.available) {
      banner.style.display = ''; btn.style.display = '';
      text.textContent = 'Update available: v' + res.latest + ' (you have v' + res.current + ').';
      umsg.className = 'msg'; umsg.textContent = '';
    } else if (manual) {
      banner.style.display = ''; btn.style.display = 'none';
      text.textContent = "You're on the latest version (v" + res.current + ').';
      umsg.textContent = '';
    }
  }

  // applyUpdate runs the elevated updater (a UAC prompt); no password needed.
  async function applyUpdate() {
    const btn = document.getElementById('update-btn');
    const umsg = document.getElementById('update-msg');
    if (!bound()) { return; }
    btn.disabled = true;
    umsg.className = 'msg';
    umsg.textContent = 'Approve the Windows permission prompt…';
    let res;
    try { res = await window.go.main.App.ApplyUpdate(); }
    catch (e) { res = { ok: false, message: String(e) }; }
    btn.disabled = false;
    umsg.className = 'msg ' + (res.ok ? 'ok' : 'err');
    umsg.textContent = res.message;
    if (res.ok) { btn.style.display = 'none'; }
  }

  document.getElementById('protection-btn').addEventListener('click', toggleProtection);
  document.getElementById('refresh').addEventListener('click', refresh);
  document.getElementById('check-updates').addEventListener('click', function () { checkUpdates(true); });
  document.getElementById('update-btn').addEventListener('click', applyUpdate);
  window.addEventListener('DOMContentLoaded', function () {
    refresh();
    loadVersion();
    checkUpdates(false);
  });
</script>
</body>
</html>
